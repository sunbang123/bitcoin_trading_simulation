services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:h2:file:/app/data/bitcoin;MODE=MySQL;DATABASE_TO_LOWER=TRUE
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: ""
      JWT_SECRET: ${JWT_SECRET}
      APP_CORS_ALLOWED_ORIGINS: ${APP_ORIGIN:-http://localhost:3000}
    volumes:
      - backend-data:/app/data
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./mock-investment
    restart: unless-stopped
    environment:
      BACKEND_INTERNAL_URL: http://backend:8080
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  backend-data:
