spring:
  config:
    activate:
      on-profile: mysql

  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/bitcoin_trading?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${MYSQL_USER:bitcoin_app}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

jwt:
  secret: ${JWT_SECRET:ctO7aoCbIxNAAA3hDdiI9GoiUhFnARiawBr6avj8WYA=}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:3600000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:1209600000}
